name: Build FOSS APK

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
  pull_request:
    branches:
      - 'dev'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft
          cache: gradle

      - name: Enable FOSS build
        run: |
          echo "" >> gradle.properties
          echo "isFullBuild=false" >> gradle.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Build Release APK
        run: ./gradlew androidApp:assembleRelease --no-daemon

      - name: Show APK files
        run: find androidApp/build/outputs -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-FOSS
          path: androidApp/build/outputs/**/*.apk
